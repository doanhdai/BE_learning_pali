name: Deploy Backend to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Navigate to target directory
            mkdir -p /mnt/user_data/Dai
            cd /mnt/user_data/Dai

            # Clone or Pull repository
            if [ ! -d "BE_learning_pali" ]; then
              git clone https://github.com/doanhdai/BE_learning_pali.git
              cd BE_learning_pali
            else
              cd BE_learning_pali
              git fetch --all
              git reset --hard origin/main
            fi

            # Setup .env if not exists
            if [ ! -f ".env" ]; then
              echo "PORT=8081" > .env
              echo "DATABASE_URL=postgresql://postgres:palipath2024@postgres:5432/learning_pali?schema=public" >> .env
              echo "PUBLIC_URL=https://api.uydev.io.vn" >> .env
            fi

            # Rebuild and restart containers
            docker compose down || true
            docker compose up -d --build
