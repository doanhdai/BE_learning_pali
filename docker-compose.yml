version: '3.9'

services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: palipath_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: palipath2024
      POSTGRES_DB: learning_pali
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"      # exposed as 5433 to avoid conflict with local postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PaliPath Backend API ───────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: palipath_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8081
      DATABASE_URL: postgresql://postgres:palipath2024@postgres:5432/learning_pali?schema=public
      PUBLIC_URL: https://api.uydev.io.vn
    ports:
      - "8081:8081"
    volumes:
      - uploads_data:/app/uploads
    # Push schema directly (no migration files needed)
    command: >
      sh -c "npx prisma db push --accept-data-loss && node server.js"

volumes:
  postgres_data:
  uploads_data:
